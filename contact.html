<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cinerama - Contactanos</title>

    <!-- Framework Boostrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
        crossorigin="anonymous"></script>

    <!-- Carrousel - Swipper -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.css" />

    <!-- Libreria de Fuentes -->
    <link
        href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,200..1000;1,200..1000&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
        rel="stylesheet">

    <!-- ICONOS -->
    <script src="https://kit.fontawesome.com/812c8ee19a.js" crossorigin="anonymous"></script>

    <!-- Icono para pestaña -->
    <link rel="shortcut icon" href="assets/icons/favicon.ico" type="image/x-icon">

    <!-- CSS -->
    <link rel="stylesheet" href="/css/styles.css">

    <!-- Recaptcha -->
    <script src="https://www.google.com/recaptcha/api.js" async defer></script>
</head>

<body>
    <!-- Header -->
    <header class="fixed-top">
        <nav class="nav navbar navbar-expand-lg">
            <div class="container">
                <a class="navbar-brand" href="/index.html">
                    <img src="assets/icons/logo.png" alt="logo" width="160" height="50">
                </a>

                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbar"
                    aria-controls="navbar" aria-expanded="false" aria-label="Toggle navigation">
                    <i class="fa-solid fa-bars"></i>
                </button>

                <div class="collapse navbar-collapse justify-content-end" id="navbar">
                    <form class="search-form">
                        <input class="form-control search-input" type="search" placeholder="Buscar...">
                        <button class="search-btn" type="submit">
                            <i class="fas fa-search"></i>
                        </button>
                    </form>
                    <ul class="navbar-nav">
                        <li class="nav-item">
                            <a class="nav-link" href="/index.html">Cartelera</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="/places.html">Sedes</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link active" href="/contact.html">Contáctenos</a>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>
    </header>

    <!-- Main -->
    <main>
        <section class="contact-section">
            <div class="container">
                <article class="row">
                    <div class="col-12 text-left">
                        <h1 class="contact-title">Contáctanos</h1>
                        <h5>Atención de Consultas o Incidencias</h5>
                        <p class="contact-description">
                            Para asegurar la calidad y optimización de nuestro servicio,
                            por favor llenar todos los campos que solicitamos.¡Gracias!
                        </p>
                    </div>
                </article>

                <article class="row">
                    <div class="col-12">
                        <form class="contact-form">
                            <div class="row g-3">
                                <div class="col-md-4 mt-4">
                                    <label class="label-contact">Nombres *</label>
                                    <input type="text" class="form-control contact-input" placeholder="Ingresar Nombres"
                                        required>
                                </div>
                                <div class="col-md-4 mt-4">
                                    <label class="label-contact">Apellidos *</label>
                                    <input type="text" class="form-control contact-input"
                                        placeholder="Ingresar Apellidos" required>
                                </div>
                                <div class="col-md-4 mt-4">
                                    <label class="label-contact">DNI *</label>
                                    <input type="text" class="form-control contact-input" placeholder="Ingresar DNI"
                                        required>
                                </div>
                                <div class="col-md-4 mt-4">
                                    <label class="label-contact">Seleccione un cine *</label>
                                    <select class="form-select select-contact" required>
                                        <option>Seleccione un cine</option>
                                        <option value="">Lima</option>
                                        <option value="">Ica</option>
                                        <option value="">Chimbote</option>
                                        <option value="">Piura</option>
                                        <option value="">Tarapoto</option>
                                        <option value="">Cajamarca</option>
                                        <option value="">Huacho</option>
                                        <option value="">Moyobamba</option>
                                        <option value="">Cusco</option>
                                    </select>
                                </div>
                                <div class="col-md-4 mt-4">
                                    <label class="label-contact">Teléfono</label>
                                    <input type="tel" class="form-control contact-input" placeholder="Ingresar Teléfono"
                                        required>
                                </div>
                                <div class="col-md-4 mt-4">
                                    <label class="label-contact">Correo Electrónico *</label>
                                    <input type="email" class="form-control contact-input"
                                        placeholder="Ingresar Correo Electrónico" required>
                                </div>
                                <div class="col-12 mt-4">
                                    <label class="label-contact">Mensaje *</label>
                                    <textarea class="form-control textarea-contact" rows="5" required minlength="10" maxlength="500"
                                        placeholder="Por favor, proporciona tu consulta o comentario"></textarea>
                                </div>
                                <div class="col-12 col-sm-6 col-lg-6 recaptcha">
                                    <div class="g-recaptcha" data-sitekey="6LdhZ4EsAAAAAMDWEC0MSF0_A1__igTvVPeGSVbj">
                                    </div>
                                </div>
                                <div class="col-12 col-sm-6 col-lg-6 div-btn-contact">
                                    <button class="btn btn-contact">Enviar</button>
                                </div>
                            </div>
                        </form>
                    </div>
                </article>
            </div>
        </section>

        <a href="https://wa.link/z15ptd" target="_blank">
            <i class="fa-brands fa-whatsapp icon-whastapp"></i>
        </a>
    </main>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <div class="row align-items-center">
                <div class="col-12 col-md-6">
                    <img src="assets/icons/logo.png" alt="Cinerama" width="140">
                </div>

                <div class="col-12 col-md-6">
                    <div class="social d-flex align-items-center justify-content-md-end gap-3">
                        <span class="footer-social-label">Síguenos en</span>
                        <div class="d-flex gap-2">
                            <a href="#" class="social-icon"><i class="fa-brands fa-facebook-f"></i></a>
                            <a href="#" class="social-icon"><i class="fa-brands fa-threads"></i></a>
                            <a href="#" class="social-icon"><i class="fa-brands fa-instagram"></i></a>
                            <a href="#" class="social-icon"><i class="fa-brands fa-x-twitter"></i></a>
                            <a href="#" class="social-icon"><i class="fa-brands fa-tiktok"></i></a>
                        </div>
                    </div>
                </div>
            </div>

            <hr class="footer-divider">

            <div class="row">
                <div class="col-12 text-center">
                    <p class="footer-copy mb-0">Cinerama S.A. | RUC 20494191637</p>
                    <p class="footer-copy mb-0">© Todos los derechos Reservados 2026</p>
                </div>
            </div>
        </div>
    </footer>
</body>

</html>
