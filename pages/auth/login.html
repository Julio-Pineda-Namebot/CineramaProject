<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cinerama - Ingresa a tu cuenta</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
        crossorigin="anonymous"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,200..1000;1,200..1000&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
        rel="stylesheet">
    <script src="https://kit.fontawesome.com/812c8ee19a.js" crossorigin="anonymous"></script>
    <link rel="shortcut icon" href="/assets/icons/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="/css/styles.css">
</head>

<body>
    <header class="fixed-top">
        <nav class="nav navbar navbar-expand-lg">
            <div class="container">
                <a class="navbar-brand" href="/index.html">
                    <img src="/assets/icons/logo.png" alt="logo" width="160" height="50">
                </a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbar"
                    aria-controls="navbar" aria-expanded="false" aria-label="Toggle navigation">
                    <i class="fa-solid fa-bars"></i>
                </button>
                <div class="collapse navbar-collapse justify-content-end" id="navbar">
                    <ul class="navbar-nav">
                        <li class="nav-item"><a class="nav-link" href="/index.html">Cartelera</a></li>
                        <li class="nav-item"><a class="nav-link" href="/places.html">Sedes</a></li>
                        <li class="nav-item"><a class="nav-link" href="/contact.html">Contáctenos</a></li>
                    </ul>
                </div>
            </div>
        </nav>
    </header>

    <main>
        <section class="ck-page">
            <div class="container">
                <div class="ck-auth-card">
                    <h1 class="ck-title h4 text-center mb-1">Tu cuenta Cinerama</h1>
                    <p class="ck-subtitle text-center mb-4" id="authIntro">
                        Ingresa o crea una cuenta para continuar con tu compra.
                    </p>

                    <div class="ck-tabs">
                        <div class="ck-tab active" data-tab="login">Iniciar sesión</div>
                        <div class="ck-tab" data-tab="register">Crear cuenta</div>
                    </div>

                    <div id="authMsg"></div>

                    <!-- Login -->
                    <form id="loginForm" class="ck-card">
                        <div class="mb-3">
                            <label class="ck-label">Correo electrónico</label>
                            <input type="email" class="form-control ck-input" id="loginEmail" required
                                placeholder="tucorreo@ejemplo.com">
                        </div>
                        <div class="mb-3">
                            <label class="ck-label">Contraseña</label>
                            <input type="password" class="form-control ck-input" id="loginPassword" required
                                placeholder="••••••••">
                        </div>
                        <button type="submit" class="ck-btn w-100">Iniciar sesión</button>
                        <p class="ck-muted text-center mt-3 mb-0">
                            Cuenta de prueba: <strong>cliente@cinerama.pe</strong> / <strong>123456</strong>
                        </p>
                    </form>

                    <!-- Registro -->
                    <form id="registerForm" class="ck-card" style="display:none;">
                        <div class="mb-3">
                            <label class="ck-label">Nombres y apellidos</label>
                            <input type="text" class="form-control ck-input" id="regName" required
                                placeholder="Ej. Ana Torres">
                        </div>
                        <div class="mb-3">
                            <label class="ck-label">DNI</label>
                            <input type="text" class="form-control ck-input" id="regDni"
                                placeholder="Documento de identidad" maxlength="12">
                        </div>
                        <div class="mb-3">
                            <label class="ck-label">Correo electrónico</label>
                            <input type="email" class="form-control ck-input" id="regEmail" required
                                placeholder="tucorreo@ejemplo.com">
                        </div>
                        <div class="mb-3">
                            <label class="ck-label">Contraseña</label>
                            <input type="password" class="form-control ck-input" id="regPassword" required
                                minlength="6" placeholder="Mínimo 6 caracteres">
                        </div>
                        <button type="submit" class="ck-btn w-100">Crear cuenta y continuar</button>
                    </form>
                </div>
            </div>
        </section>
    </main>

    <footer class="footer">
        <div class="container">
            <div class="row align-items-center">
                <div class="col-12 col-md-6">
                    <img src="/assets/icons/logo.png" alt="Cinerama" width="140">
                </div>
                <div class="col-12 col-md-6">
                    <div class="social d-flex align-items-center justify-content-md-end gap-3">
                        <span class="footer-social-label">Síguenos en</span>
                        <div class="d-flex gap-2">
                            <a href="#" class="social-icon"><i class="fa-brands fa-facebook-f"></i></a>
                            <a href="#" class="social-icon"><i class="fa-brands fa-instagram"></i></a>
                            <a href="#" class="social-icon"><i class="fa-brands fa-x-twitter"></i></a>
                        </div>
                    </div>
                </div>
            </div>
            <hr class="footer-divider">
            <div class="row">
                <div class="col-12 text-center">
                    <p class="footer-copy mb-0">Cinerama S.A. | RUC 20494191637</p>
                    <p class="footer-copy mb-0">© Todos los derechos Reservados 2026</p>
                </div>
            </div>
        </div>
    </footer>

    <script src="/javascript/checkout/data.js"></script>
    <script src="/javascript/checkout/db.js"></script>
    <script src="/javascript/checkout/api.js"></script>
    <script src="/javascript/checkout/store.js"></script>
    <script src="/javascript/checkout/auth.js"></script>
    <script src="/javascript/checkout/ui.js"></script>
    <script src="/javascript/checkout/pages/login.js"></script>
</body>

</html>
